schema_version: "1.0"

# ── Identity ──────────────────────────────────────────────────────────────────
id: "slice-heat"
name: "DC Heating Element Controller"
status: "prototype"
category: "integrated"

summary: "DC heating element controller with thermocouple feedback and PID."
description: null

# ── Versioning ────────────────────────────────────────────────────────────────
version:
  hardware: "0.1.0"
  firmware: "0.1.0"
  manifest: "0.1.0"

# ── Compatibility ─────────────────────────────────────────────────────────────
compatibility:
  slice_spec: ">=0.1.0 <0.2.0"
  crumbs_protocol: null
  anolis_provider_api: null

# ── Hardware ──────────────────────────────────────────────────────────────────
hardware:
  mcu:
    type: "dev-board-socket"
    form_factor: "nano"
    primary: "ATmega328P"
    supported:
      - "ATmega328P"
  primary_ic:
    manufacturer: "Analog Devices"
    part_number: "MAX31855K"
  hw_gen_current: 1
  hw_gen_supported: [1]
  pcb:
    layers: 2
    thickness: "1.6mm"
    copper_weight: "1oz"
    dimensions: "70mm x 100mm"
  connectors:
    - ref: "J1"
      type: "slice-bus-10pin"
      purpose: "power-and-i2c"
  mounting:
    pattern: "slice-standard-v0"
    hole_size: "M3"
    inset: "5mm"
  pcb_color_prototype: null
  pcb_color_production: null
  enclosure:
    supported: false
    path: null

# ── Electrical ────────────────────────────────────────────────────────────────
electrical:
  input_voltage: "12V"
  logic_voltage: "5V"
  max_current: null
  protection:
    reverse_polarity: false
    input_esd: false
    fuse: false
  isolation:
    present: false

# ── Interfaces ────────────────────────────────────────────────────────────────
interfaces:
  host:
    type: "i2c"
    address_default: 6
    address_configurable: true
  data:
    inputs:
      - name: "TC1"
        type: "thermocouple-k"
    outputs:
      - name: "HEATER1"
        type: "pwm-dc"

# ── Capabilities ──────────────────────────────────────────────────────────────
capabilities:
  - id: "temperature_sensing"
    channels: 1
    control_modes: []
  - id: "dc_heater_control"
    channels: 1
    control_modes: ["pid", "ramp"]

# ── Firmware ──────────────────────────────────────────────────────────────────
firmware:
  required: true
  path: "firmware/"
  language: "c++"
  framework: "arduino"
  targets:
    - "nano"
  lib_deps:
    - "PID_v1"
    - "Adafruit_MAX31855"

# ── Protocol ──────────────────────────────────────────────────────────────────
protocol:
  type: "i2c-custom"
  discovery:
    supported: false
  commands: []

# ── Software ──────────────────────────────────────────────────────────────────
software: null

# ── Artifacts ─────────────────────────────────────────────────────────────────
artifacts:
  schematic: "hardware/BREAD_Slice.kicad_sch"
  pcb: "hardware/BREAD_Slice.kicad_pcb"
  firmware: "firmware/"
  docs: null
  bom: "documentation/BOM_TEMP.ods"
  gerbers: "hardware/Gerbers/"
  pick_and_place: null
  datasheets: []

# ── Manufacturing ─────────────────────────────────────────────────────────────
manufacturing:
  assembly_type: "manual"
  preferred_fab: null
  dnp_parts: []
  critical_parts: []
  substitutions_allowed: true

# ── Validation ────────────────────────────────────────────────────────────────
validation:
  status: "not_validated"
  tested_revisions: []
  tests:
    electrical: false
    firmware: false
    environmental: false
    integration: false
  known_issues: []

# ── Safety ────────────────────────────────────────────────────────────────────
safety:
  hazards:
    - "high-temperature surfaces"
  max_safe_voltage: "12V"
  intended_environment: "lab"
  not_for:
    - "human safety critical systems"
    - "unattended heating operations"

# ── Dependencies ──────────────────────────────────────────────────────────────
dependencies:
  hardware: []
  firmware_libraries: []
  software_packages: []

# ── Relations ─────────────────────────────────────────────────────────────────
related:
  supersedes: null
  superseded_by: null
  variants: []
  compatible_slices: ["slice-rlht"]

# ── Maintainers ───────────────────────────────────────────────────────────────
maintainers:
  - name: "Cameron Brooks"
    role: "owner"

# ── License ───────────────────────────────────────────────────────────────────
license:
  hardware: "CERN-OHL-S-2.0"
  firmware: "GPL-3.0-or-later"
  software: null
  docs: "CC-BY-4.0"

# ── Repository ────────────────────────────────────────────────────────────────
repository:
  url: "https://github.com/feastorg/Slice_HEAT"

# ── Metadata ──────────────────────────────────────────────────────────────────
metadata:
  created: "2026-05-19"
  updated: "2026-05-19"
  tags:
    - "heater-control"
    - "thermocouple"
    - "pid"
    - "temperature"
    - "dc-heating"
